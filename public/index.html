<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Média Escolar</title>
</head>
<body>
    <h1>Sistema de Cálculo de Média Escolar</h1>
    
    <form id="formAluno">
        <label for="nome">Nome do Aluno:</label><br>
        <input type="text" id="nome" required><br><br>
        
        <label for="nota1">Nota do 1º Bimestre (0-10):</label><br>
        <input type="number" id="nota1" step="0.1" min="0" max="10" required><br><br>
        
        <label for="nota2">Nota do 2º Bimestre (0-10):</label><br>
        <input type="number" id="nota2" step="0.1" min="0" max="10" required><br><br>
        
        <button type="submit">Adicionar Aluno</button>
    </form>

    <br><hr><br>

    <h2>Lista de Alunos</h2>
    <table border="1" id="tabelaAlunos">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Média</th>
                <th>Situação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
        </tbody>
    </table>

    <script>
        let alunos = [];

        function carregarDados() {
            const dadosSalvos = localStorage.getItem('alunos');
            if (dadosSalvos) {
                alunos = JSON.parse(dadosSalvos);
                exibirTabela();
            }
        }

        function calcularMedia(nota1, nota2) {
            return (nota1 + nota2) / 2;
        }

        function definirSituacao(media) {
            if (media >= 6) return 'Aprovado.';
            if (media >= 2) return 'Exame Final.';
            return 'Reprovado.';
        }

        function adicionarAluno(nome, nota1, nota2) {
            const media = calcularMedia(nota1, nota2);
            const aluno = {
                id: Date.now(),
                nome: nome,
                nota1: nota1,
                nota2: nota2,
                media: media,
                situacao: definirSituacao(media)
            };
            alunos.push(aluno);
            salvarLocalStorage();
            exibirTabela();
        }

        function salvarLocalStorage() {
            localStorage.setItem('alunos', JSON.stringify(alunos));
        }

        function exibirTabela() {
            const corpoTabela = document.getElementById('corpoTabela');
            corpoTabela.innerHTML = '';
            
            if (alunos.length === 0) {
                corpoTabela.innerHTML = '<tr><td colspan="5" style="text-align: center;">Nenhum aluno cadastrado</td></tr>';
                return;
            }
            
            for (let i = 0; i < alunos.length; i++) {
                const aluno = alunos[i];
                const linha = corpoTabela.insertRow();
                linha.insertCell(0).textContent = aluno.nome;
                linha.insertCell(1).textContent = aluno.nota1.toFixed(1);
                linha.insertCell(2).textContent = aluno.nota2.toFixed(1);
                linha.insertCell(3).textContent = aluno.media.toFixed(1);
                linha.insertCell(4).textContent = aluno.situacao;
            }
        }

        document.getElementById('formAluno').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const nota1 = parseFloat(document.getElementById('nota1').value);
            const nota2 = parseFloat(document.getElementById('nota2').value);
            
            if (!nome) {
                alert('Por favor, digite o nome do aluno');
                return;
            }
            
            if (isNaN(nota1) || isNaN(nota2)) {
                alert('Por favor, digite notas válidas');
                return;
            }
            
            if (nota1 < 0 || nota1 > 10 || nota2 < 0 || nota2 > 10) {
                alert('As notas devem estar entre 0 e 10');
                return;
            }
            
            adicionarAluno(nome, nota1, nota2);
            
            document.getElementById('nome').value = '';
            document.getElementById('nota1').value = '';
            document.getElementById('nota2').value = '';
            document.getElementById('nome').focus();
        });

        carregarDados();
    </script>
</body>
</html>
